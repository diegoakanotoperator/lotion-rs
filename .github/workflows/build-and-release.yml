# This file intentionally replaces the old combined build-and-release.yml.
#
# The pipeline is now split into purpose-specific workflows:
#
#   ci.yml      — Lint (check/clippy/fmt), tests, cargo-audit
#                 Runs on: push to main/develop, pull_request
#
#   build.yml   — Multi-platform Tauri bundle builds
#                 (Linux x86_64 .deb/.rpm/.AppImage, macOS x64 .dmg, macOS arm64 .dmg)
#                 Runs on: push to main/develop, pull_request, and v* tags
#
#   release.yml — Full release pipeline triggered by v* tags or workflow_dispatch
#                 Builds all platforms → generates CHANGELOG → SHA-256 checksums
#                 → publishes GitHub Release with all bundles attached
#
# HOW TO RELEASE:
#   git tag -a v0.3.0 -m "Release v0.3.0"
#   git push origin v0.3.0
#
# Or manually from: Actions → Release → Run workflow → enter tag name
name: _REPLACED

on:
  workflow_dispatch:
    # No-op. Use release.yml instead.

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "This workflow is retired. See ci.yml, build.yml, and release.yml."
          exit 0