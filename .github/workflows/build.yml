name: Build

# Builds all platform packages. Runs on every push/PR so we catch
# compilation regressions early, but artifact upload is cheap and
# gives us downloadable bundles for manual QA.
on:
  push:
    branches: [main, develop, rust-version]
    tags: ["v*"]
  pull_request:
    branches: [main, develop, rust-version]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ─────────────────────────────────────────────────
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            bundle_glob: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

          # ── macOS ─────────────────────────────────────────────────
          - name: macOS x86_64 (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
            bundle_glob: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

          - name: macOS aarch64 (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
            bundle_glob: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

          # ── Windows ───────────────────────────────────────────────
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            bundle_glob: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── macOS deps ──────────────────────────────────────────────
      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: brew install hunspell llvm

      - name: Locate libclang (macOS)
        if: runner.os == 'macOS'
        run: |
          LLVM_LIB_DIR="$(brew --prefix llvm)/lib"
          echo "LLVM_LIB_DIR: $LLVM_LIB_DIR"
          ls -l "$LLVM_LIB_DIR/libclang.dylib"
          # Symlink to /usr/local/lib which is usually searched by dyld
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "$LLVM_LIB_DIR/libclang.dylib" /usr/local/lib/libclang.dylib

      # ── Linux deps ──────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libhunspell-dev \
            libclang-dev clang llvm \
            rpm

      # ── Windows deps ────────────────────────────────────────────
      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        run: |
          echo "Using bundled hunspell..."

      # ── Rust ────────────────────────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: build-${{ matrix.platform }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: build-${{ matrix.platform }}-

      # ── Tauri CLI (cached via cargo-binstall for speed) ─────────
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        run: cargo binstall --no-confirm tauri-cli@^2

      # ── Build ───────────────────────────────────────────────────
      - name: Build Tauri bundles
        working-directory: src-tauri
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            export SDKROOT=$(xcrun --show-sdk-path)
            export LIBCLANG_PATH="$(brew --prefix llvm)/lib"
            export DYLD_LIBRARY_PATH="$(brew --prefix llvm)/lib"
            echo "LIBCLANG_PATH: $LIBCLANG_PATH"
          elif [ "${{ runner.os }}" == "Windows" ]; then
            # Windows handled via env block for clarity
            echo "Building on Windows..."
          else
            export LIBCLANG_PATH=$(llvm-config --libdir)
            echo "LIBCLANG_PATH: $LIBCLANG_PATH"
          fi
          cargo tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── Collect bundles into a flat staging directory ───────────
      - name: Collect bundles
        shell: bash
        run: |
          mkdir -p staging
          # Copy every bundle file (deb/rpm/AppImage/dmg/exe/msi) to staging/
          find src-tauri/target/${{ matrix.target }}/release/bundle \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) \
            -exec cp {} staging/ \;
          ls -lh staging/

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lotion-${{ matrix.platform }}-${{ github.sha }}
          path: staging/
          retention-days: 14
          if-no-files-found: error
