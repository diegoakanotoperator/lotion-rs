name: CI

on:
  push:
    branches: [main, develop, rust-version]
  pull_request:
    branches: [main, develop, rust-version]

# Cancel any in-progress run for the same branch/PR so we never waste minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. Compile check + lint + format
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (check / clippy / fmt)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libhunspell-dev \
            libclang-dev clang llvm

      - name: Setup Rust (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: lint-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: lint-

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets --release

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --release -- -D warnings

  # ────────────────────────────────────────────────────────────────
  # 2. Unit / integration tests
  # ────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libhunspell-dev \
            libclang-dev clang llvm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: test-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: test-

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all-targets --release

  # ────────────────────────────────────────────────────────────────
  # 3. Dependency security audit
  # ────────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # Run independently of lint so we always get audit results.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit
